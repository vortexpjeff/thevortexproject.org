<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vortex Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@250;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #070907;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            font-family: 'JetBrains Mono', monospace;
        }
        canvas {
            display: block;
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
        }
        #label {
            position: fixed;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.55rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: rgba(140, 180, 140, 0.12);
            pointer-events: none;
            font-weight: 250;
            text-align: center;
            line-height: 1.6;
            transition: opacity 1s;
        }
        #coords {
            position: fixed;
            bottom: 36px;
            right: 36px;
            font-size: 0.5rem;
            letter-spacing: 0.15em;
            color: rgba(140, 180, 140, 0.08);
            pointer-events: none;
            font-weight: 250;
            text-align: right;
            line-height: 1.5;
        }
        @media (max-width: 600px) {
            #coords { display: none; }
            #label { font-size: 0.45rem; bottom: 20px; }
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="label">the vortex project · pine hollow</div>
    <div id="coords">35.856548<br>−83.374437</div>
    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // ─── living field ───
        // nodes that drift slowly, connected by faint threads
        // each node has a tiny bioluminescent pulse

        const NODES = 45;
        const nodes = [];

        function rand(min, max) { return min + Math.random() * (max - min); }

        for (let i = 0; i < NODES; i++) {
            nodes.push({
                x: rand(0, W),
                y: rand(0, H),
                vx: rand(-0.08, 0.08),
                vy: rand(-0.08, 0.08),
                phase: rand(0, Math.PI * 2),
                size: rand(0.4, 1.8),
                // anchor to a region so the field has structure
                anchorX: rand(0, W),
                anchorY: rand(0, H),
                pull: rand(0.0005, 0.002)
            });
        }

        // ─── rings (detection events) ───
        const rings = [];
        function addRing(x, y, intensity) {
            rings.push({ x, y, intensity, life: 1.0 });
        }

        // random detection simulation
        let tick = 0;
        function simulateDetection() {
            const x = rand(W * 0.1, W * 0.9);
            const y = rand(H * 0.1, H * 0.9);
            const intensity = rand(0.3, 1.0);
            addRing(x, y, intensity);
        }

        // initial burst
        for (let i = 0; i < 4; i++) setTimeout(simulateDetection, i * 800);
        setInterval(() => simulateDetection(), 4000 + rand(0, 4000));

        // ─── try to fetch real bird data ───
        let birdData = null;
        fetch('https://raw.githubusercontent.com/vortexpjeff/pine-hollow-dashboard/main/data/latest.json', { signal: AbortSignal.timeout(4000) })
            .then(r => r.json())
            .then(d => { birdData = d; })
            .catch(() => {});

        // ─── draw ───
        function draw() {
            tick++;

            // clear fully — no accumulation
            ctx.fillStyle = '#070907';
            ctx.fillRect(0, 0, W, H);

            // ── update nodes ──
            for (const n of nodes) {
                // drift
                n.x += n.vx;
                n.y += n.vy;

                // gentle pull toward anchor
                const dx = n.anchorX - n.x;
                const dy = n.anchorY - n.y;
                n.vx += dx * n.pull;
                n.vy += dy * n.pull;

                // wander
                n.vx += rand(-0.005, 0.005);
                n.vy += rand(-0.005, 0.005);

                // damping
                n.vx *= 0.995;
                n.vy *= 0.995;

                // wrap edges gently
                const margin = 60;
                if (n.x < -margin) n.x = W + margin;
                if (n.x > W + margin) n.x = -margin;
                if (n.y < -margin) n.y = H + margin;
                if (n.y > H + margin) n.y = -margin;
            }

            // ── draw threads between close nodes ──
            const maxDist = 140;
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const dx = nodes[i].x - nodes[j].x;
                    const dy = nodes[i].y - nodes[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < maxDist) {
                        const t = 1 - dist / maxDist;
                        const alpha = t * t * 0.08;
                        const phase = (nodes[i].phase + nodes[j].phase + tick * 0.003) % 1;
                        const r = 140 + Math.sin(phase * Math.PI * 2) * 30;
                        const g = 180 + Math.sin(phase * Math.PI * 2 + 0.5) * 20;
                        const b = 140 + Math.sin(phase * Math.PI * 2 + 1.0) * 20;
                        ctx.strokeStyle = `rgba(${r|0},${g|0},${b|0},${alpha})`;
                        ctx.lineWidth = 0.3 + t * 0.3;
                        ctx.beginPath();
                        ctx.moveTo(nodes[i].x, nodes[i].y);
                        ctx.lineTo(nodes[j].x, nodes[j].y);
                        ctx.stroke();
                    }
                }
            }

            // ── draw nodes ──
            for (const n of nodes) {
                const pulse = 0.6 + 0.4 * Math.sin(tick * 0.015 + n.phase);
                const alpha = 0.2 + 0.5 * pulse;
                const r = 140 + Math.sin(n.phase + tick * 0.005) * 40;
                const g = 180 + Math.cos(n.phase * 0.7 + tick * 0.004) * 25;
                const b = 140 + Math.sin(n.phase * 1.3 + tick * 0.006) * 30;
                const sz = n.size * pulse;

                ctx.fillStyle = `rgba(${r|0},${g|0},${b|0},${alpha})`;
                ctx.beginPath();
                ctx.arc(n.x, n.y, sz, 0, Math.PI * 2);
                ctx.fill();

                // tiny glow
                if (pulse > 0.8) {
                    ctx.fillStyle = `rgba(${r|0},${g|0},${b|0},${alpha * 0.15})`;
                    ctx.beginPath();
                    ctx.arc(n.x, n.y, sz * 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // ── draw rings ──
            for (let i = rings.length - 1; i >= 0; i--) {
                const r = rings[i];
                r.life -= 0.012;
                if (r.life <= 0) { rings.splice(i, 1); continue; }

                const radius = (1 - r.life) * 100 * r.intensity;
                const alpha = r.life * r.life * 0.3;

                const rCol = 160 + Math.sin(r.intensity * 10 + tick * 0.01) * 30;
                const gCol = 190 + Math.cos(r.intensity * 8 + tick * 0.008) * 20;
                const bCol = 150;

                ctx.strokeStyle = `rgba(${rCol|0},${gCol|0},${bCol|0},${alpha})`;
                ctx.lineWidth = 0.6 + r.life * 0.8;
                ctx.beginPath();
                ctx.arc(r.x, r.y, radius, 0, Math.PI * 2);
                ctx.stroke();

                // inner glow
                if (r.life > 0.7) {
                    const inner = (r.life - 0.7) / 0.3;
                    ctx.fillStyle = `rgba(${rCol|0},${gCol|0},${bCol|0},${inner * 0.06})`;
                    ctx.beginPath();
                    ctx.arc(r.x, r.y, 4 * r.intensity, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // try to spawn from bird data every ~2s
            if (tick % 120 === 0 && birdData && birdData.recent && birdData.recent.length) {
                const d = birdData.recent[Math.floor(Math.random() * birdData.recent.length)];
                if (d && d.confidence) {
                    const x = rand(W * 0.15, W * 0.85);
                    const y = rand(H * 0.15, H * 0.85);
                    addRing(x, y, d.confidence / 100);
                }
            }

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
