<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vortex Project — Blueprints</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@200;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #060b08;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'JetBrains Mono', monospace;
            color: rgba(180, 220, 180, 0.6);
        }

        /* ─── GRID OVERLAY ─── */
        #grid {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(100, 160, 100, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(100, 160, 100, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* ─── SCHEMATIC DECORATIONS ─── */
        #scanline {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 2px;
            z-index: 0;
            background: linear-gradient(90deg, transparent, rgba(140, 200, 140, 0.08), transparent);
            animation: scan 8s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: -2px; }
            100% { top: 100vh; }
        }

        #corner-tl, #corner-tr, #corner-bl, #corner-br {
            position: fixed;
            width: 30px;
            height: 30px;
            z-index: 0;
            pointer-events: none;
            border-color: rgba(140, 200, 140, 0.1);
            border-style: solid;
            border-width: 0;
        }
        #corner-tl { top: 16px; left: 16px; border-top-width: 1px; border-left-width: 1px; }
        #corner-tr { top: 16px; right: 16px; border-top-width: 1px; border-right-width: 1px; }
        #corner-bl { bottom: 16px; left: 16px; border-bottom-width: 1px; border-left-width: 1px; }
        #corner-br { bottom: 16px; right: 16px; border-bottom-width: 1px; border-right-width: 1px; }

        #status-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.5rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(140, 180, 140, 0.08);
            pointer-events: none;
            z-index: 1;
            font-weight: 200;
        }

        /* ─── CANVAS (ambient particles) ─── */
        canvas {
            display: block;
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        /* ─── SCHEMATIC VIEWER ─── */
        #viewer {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            pointer-events: none;
        }

        .blueprint {
            pointer-events: auto;
            width: 640px;
            max-width: 92vw;
            max-height: 85vh;
            background: rgba(8, 16, 10, 0.92);
            border: 1px solid rgba(140, 200, 140, 0.12);
            border-radius: 4px;
            padding: 0;
            position: relative;
            opacity: 0;
            transform: scale(0.97);
            transition: opacity 0.5s ease, transform 0.5s ease;
            box-shadow: 0 0 80px rgba(0,0,0,0.7), 0 0 120px rgba(60, 120, 60, 0.03);
            display: flex;
            flex-direction: column;
        }

        .blueprint.visible {
            opacity: 1;
            transform: scale(1);
        }

        /* ─── HEADER BAR ─── */
        .bp-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            border-bottom: 1px solid rgba(140, 200, 140, 0.08);
            font-size: 0.6rem;
            letter-spacing: 0.08em;
            color: rgba(140, 200, 140, 0.35);
            text-transform: uppercase;
        }

        .bp-header .bp-id {
            color: rgba(140, 200, 140, 0.5);
        }

        .bp-header .bp-status {
            color: rgba(140, 200, 140, 0.25);
        }

        /* ─── SCHEMATIC VIEW ─── */
        .bp-schematic {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: rgba(10, 20, 12, 0.6);
            border-bottom: 1px solid rgba(140, 200, 140, 0.06);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bp-schematic canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .bp-schematic .placeholder-schematic {
            position: absolute;
            z-index: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(140, 200, 140, 0.06);
            font-size: 3rem;
            font-weight: 200;
            letter-spacing: 0.2em;
        }

        /* ─── SPECS GRID ─── */
        .bp-specs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            border-bottom: 1px solid rgba(140, 200, 140, 0.06);
        }

        .bp-spec {
            padding: 10px 20px;
            border-right: 1px solid rgba(140, 200, 140, 0.04);
            border-bottom: 1px solid rgba(140, 200, 140, 0.04);
        }

        .bp-spec:nth-child(2n) { border-right: none; }
        .bp-spec:nth-last-child(-n+2) { border-bottom: none; }

        .bp-spec .label {
            font-size: 0.52rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(140, 200, 140, 0.25);
            margin-bottom: 2px;
        }

        .bp-spec .value {
            font-size: 0.7rem;
            color: rgba(180, 220, 180, 0.7);
            font-weight: 400;
        }

        .bp-spec .value a {
            color: rgba(140, 200, 140, 0.6);
            text-decoration: none;
        }
        .bp-spec .value a:hover {
            color: rgba(140, 200, 140, 0.9);
        }

        /* ─── DESCRIPTION ─── */
        .bp-desc {
            padding: 14px 20px;
            font-size: 0.68rem;
            line-height: 1.6;
            color: rgba(180, 210, 180, 0.5);
            border-bottom: 1px solid rgba(140, 200, 140, 0.06);
        }

        /* ─── ACTION BAR ─── */
        .bp-actions {
            display: flex;
            gap: 8px;
            padding: 12px 20px;
            flex-wrap: wrap;
        }

        .bp-actions a {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            padding: 6px 14px;
            border-radius: 2px;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            background: rgba(140, 200, 140, 0.04);
            border: 1px solid rgba(140, 200, 140, 0.1);
            color: rgba(140, 200, 140, 0.5);
            transition: all 0.2s;
        }

        .bp-actions a:hover {
            background: rgba(140, 200, 140, 0.08);
            border-color: rgba(140, 200, 140, 0.2);
            color: rgba(180, 220, 180, 0.8);
        }

        .bp-actions a.primary {
            background: rgba(140, 200, 140, 0.1);
            border-color: rgba(140, 200, 140, 0.2);
            color: rgba(160, 220, 160, 0.7);
        }

        .bp-actions a.primary:hover {
            background: rgba(140, 200, 140, 0.16);
            color: rgba(180, 230, 180, 0.9);
        }

        /* ─── NAV ─── */
        .bp-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px 14px;
            border-top: 1px solid rgba(140, 200, 140, 0.06);
        }

        .bp-nav button {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.55rem;
            padding: 5px 12px;
            border-radius: 2px;
            border: 1px solid rgba(140, 200, 140, 0.08);
            background: transparent;
            color: rgba(140, 200, 140, 0.3);
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .bp-nav button:hover {
            background: rgba(140, 200, 140, 0.06);
            color: rgba(140, 200, 140, 0.6);
        }

        .bp-nav button:disabled {
            opacity: 0.15;
            cursor: default;
        }

        .bp-nav .bp-counter {
            font-size: 0.5rem;
            color: rgba(140, 200, 140, 0.15);
            letter-spacing: 0.15em;
        }

        @media (max-width: 600px) {
            .bp-specs { grid-template-columns: 1fr; }
            .bp-spec:nth-child(2n) { border-right: 1px solid rgba(140,200,140,0.04); }
            .bp-spec:nth-last-child(-n+2) { border-bottom: 1px solid rgba(140,200,140,0.04); }
            .bp-spec:last-child { border-bottom: none; }
        }
    </style>
</head>
<body>

    <div id="grid"></div>
    <div id="scanline"></div>
    <div id="corner-tl"></div>
    <div id="corner-tr"></div>
    <div id="corner-bl"></div>
    <div id="corner-br"></div>
    <div id="status-bar">the vortex project · schematic library</div>

    <canvas id="c"></canvas>

    <div id="viewer">
        <div class="blueprint" id="bp">
            <div class="bp-header">
                <span class="bp-id" id="bp-id">VPR-001</span>
                <span class="bp-status" id="bp-status">open source · hardware</span>
            </div>
            <div class="bp-schematic" id="bp-schematic">
                <canvas id="schematic-canvas"></canvas>
                <div class="placeholder-schematic">◈</div>
            </div>
            <div class="bp-specs" id="bp-specs"></div>
            <div class="bp-desc" id="bp-desc"></div>
            <div class="bp-actions" id="bp-actions"></div>
            <div class="bp-nav">
                <button id="prevBtn">← prev</button>
                <span class="bp-counter" id="counter"></span>
                <button id="nextBtn">next →</button>
            </div>
        </div>
    </div>

    <script>
        // ─── AMBIENT CANVAS ───
        const c = document.getElementById('c');
        const ctx = c.getContext('2d');
        let W, H;
        function resize() { W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        const pts = [];
        for (let i = 0; i < 35; i++) {
            pts.push({
                x: Math.random() * W, y: Math.random() * H,
                vx: (Math.random() - 0.5) * 0.04,
                vy: (Math.random() - 0.5) * 0.04,
                phase: Math.random() * Math.PI * 2,
                sz: Math.random() * 1.2 + 0.2,
                ax: Math.random() * W, ay: Math.random() * H,
                pull: Math.random() * 0.001 + 0.0002
            });
        }

        function drawAmbient() {
            ctx.fillStyle = '#060b08';
            ctx.fillRect(0, 0, W, H);

            for (const p of pts) {
                p.x += p.vx; p.y += p.vy;
                p.vx += (p.ax - p.x) * p.pull;
                p.vy += (p.ay - p.y) * p.pull;
                p.vx += (Math.random() - 0.5) * 0.003;
                p.vy += (Math.random() - 0.5) * 0.003;
                p.vx *= 0.995; p.vy *= 0.995;
                if (p.x < -40) p.x = W + 40; if (p.x > W + 40) p.x = -40;
                if (p.y < -40) p.y = H + 40; if (p.y > H + 40) p.y = -40;
            }

            for (let i = 0; i < pts.length; i++) {
                for (let j = i + 1; j < pts.length; j++) {
                    const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
                    const d = Math.sqrt(dx * dx + dy * dy);
                    if (d < 120) {
                        const t = 1 - d / 120;
                        ctx.strokeStyle = `rgba(120,180,120,${t * t * 0.04})`;
                        ctx.lineWidth = 0.3;
                        ctx.beginPath();
                        ctx.moveTo(pts[i].x, pts[i].y);
                        ctx.lineTo(pts[j].x, pts[j].y);
                        ctx.stroke();
                    }
                }
            }

            for (const p of pts) {
                const pulse = 0.5 + 0.5 * Math.sin(Date.now() * 0.001 * 0.8 + p.phase);
                ctx.fillStyle = `rgba(140,200,140,${0.08 + 0.2 * pulse})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.sz * (0.5 + pulse), 0, Math.PI * 2);
                ctx.fill();
            }

            requestAnimationFrame(drawAmbient);
        }
        drawAmbient();

        // ─── SCHEMATIC CANVAS (generative drawing) ───
        const sc = document.getElementById('schematic-canvas');
        const sctx = sc.getContext('2d');

        function resizeSchematic() {
            const rect = document.getElementById('bp-schematic').getBoundingClientRect();
            sc.width = rect.width || 640;
            sc.height = rect.height || 360;
        }
        resizeSchematic();
        window.addEventListener('resize', resizeSchematic);

        function drawSchematic(style) {
            const w = sc.width, h = sc.height;
            sctx.clearRect(0, 0, w, h);

            const cx = w / 2, cy = h / 2;

            // Grid
            sctx.strokeStyle = 'rgba(140,200,140,0.04)';
            sctx.lineWidth = 0.5;
            for (let x = 0; x < w; x += 20) {
                sctx.beginPath(); sctx.moveTo(x, 0); sctx.lineTo(x, h); sctx.stroke();
            }
            for (let y = 0; y < h; y += 20) {
                sctx.beginPath(); sctx.moveTo(0, y); sctx.lineTo(w, y); sctx.stroke();
            }

            // Style-specific drawing
            if (style === 'farmbot' || style === 'robotics' || style === 'CNC') {
                drawCNCSchematic(sctx, w, h, cx, cy);
            } else if (style === 'energy' || style === 'solar') {
                drawSolarSchematic(sctx, w, h, cx, cy);
            } else if (style === 'building' || style === 'architecture') {
                drawArchSchematic(sctx, w, h, cx, cy);
            } else if (style === 'electronics' || style === 'IoT' || style === 'circuit') {
                drawCircuitSchematic(sctx, w, h, cx, cy);
            } else if (style === 'machinery' || style === 'industrial' || style === 'fabrication') {
                drawMachineSchematic(sctx, w, h, cx, cy);
            } else if (style === 'bioacoustics' || style === 'birds' || style === 'audio') {
                drawBioSchematic(sctx, w, h, cx, cy);
            } else {
                drawGenericSchematic(sctx, w, h, cx, cy);
            }
        }

        function drawCNCSchematic(ctx, w, h, cx, cy) {
            // Gantry / CNC gantry lines
            ctx.strokeStyle = 'rgba(140,200,140,0.3)';
            ctx.lineWidth = 0.6;
            // Rails
            ctx.strokeRect(cx - 100, cy - 60, 200, 120);
            // Gantry
            ctx.beginPath();
            ctx.moveTo(cx - 100, cy - 30);
            ctx.lineTo(cx + 100, cy - 30);
            ctx.stroke();
            // Tool head
            ctx.fillStyle = 'rgba(140,200,140,0.15)';
            ctx.fillRect(cx - 8, cy - 10, 16, 20);
            // Lines
            ctx.strokeStyle = 'rgba(140,200,140,0.15)';
            ctx.lineWidth = 0.3;
            for (let i = -90; i <= 90; i += 15) {
                ctx.beginPath();
                ctx.moveTo(cx + i, cy - 60);
                ctx.lineTo(cx + i, cy + 60);
                ctx.stroke();
            }
            // Corner dimension marks
            ctx.strokeStyle = 'rgba(140,200,140,0.1)';
            ctx.lineWidth = 0.3;
            ctx.beginPath();
            ctx.moveTo(cx - 100, cy + 60); ctx.lineTo(cx - 100, cy + 75);
            ctx.moveTo(cx + 100, cy + 60); ctx.lineTo(cx + 100, cy + 75);
            ctx.moveTo(cx - 100, cy + 75); ctx.lineTo(cx + 100, cy + 75);
            ctx.stroke();
            // Dimension text
            ctx.fillStyle = 'rgba(140,200,140,0.12)';
            ctx.font = '8px JetBrains Mono';
            ctx.fillText('200mm', cx - 16, cy + 72);
        }

        function drawSolarSchematic(ctx, w, h, cx, cy) {
            // Sun + collector
            ctx.strokeStyle = 'rgba(212,167,106,0.2)';
            ctx.lineWidth = 0.5;
            // Sun
            ctx.beginPath();
            ctx.arc(cx, cy - 40, 18, 0, Math.PI * 2);
            ctx.stroke();
            // Rays
            ctx.strokeStyle = 'rgba(212,167,106,0.1)';
            for (let a = 0; a < 8; a++) {
                const angle = a * Math.PI / 4;
                ctx.beginPath();
                ctx.moveTo(cx + Math.cos(angle) * 22, cy - 40 + Math.sin(angle) * 22);
                ctx.lineTo(cx + Math.cos(angle) * 30, cy - 40 + Math.sin(angle) * 30);
                ctx.stroke();
            }
            // Collector
            ctx.strokeStyle = 'rgba(140,200,140,0.25)';
            ctx.lineWidth = 0.6;
            ctx.strokeRect(cx - 50, cy + 10, 100, 30);
            // Angle lines
            ctx.strokeStyle = 'rgba(140,200,140,0.1)';
            ctx.lineWidth = 0.3;
            ctx.beginPath();
            ctx.moveTo(cx - 50, cy + 40); ctx.lineTo(cx - 50, cy + 55);
            ctx.moveTo(cx + 50, cy + 40); ctx.lineTo(cx + 50, cy + 55);
            ctx.moveTo(cx - 50, cy + 55); ctx.lineTo(cx + 50, cy + 55);
            ctx.stroke();
            // Tilt indicator
            ctx.beginPath();
            ctx.moveTo(cx - 50, cy + 40);
            ctx.lineTo(cx - 80, cy + 60);
            ctx.lineTo(cx - 80, cy + 55);
            ctx.stroke();
            ctx.fillStyle = 'rgba(140,200,140,0.08)';
            ctx.font = '7px JetBrains Mono';
            ctx.fillText('tilt 45°', cx - 85, cy + 52);
        }

        function drawArchSchematic(ctx, w, h, cx, cy) {
            // Floor plan
            ctx.strokeStyle = 'rgba(140,200,140,0.25)';
            ctx.lineWidth = 0.6;
            ctx.strokeRect(cx - 80, cy - 50, 160, 100);
            // Walls
            ctx.strokeStyle = 'rgba(140,200,140,0.1)';
            ctx.lineWidth = 0.3;
            ctx.strokeRect(cx + 10, cy - 50, 70, 45);
            ctx.strokeRect(cx - 80, cy - 10, 50, 60);
            // Windows
            ctx.strokeStyle = 'rgba(212,167,106,0.15)';
            ctx.setLineDash([3, 3]);
            ctx.strokeRect(cx - 70, cy - 42, 20, 4);
            ctx.strokeRect(cx + 20, cy - 42, 20, 4);
            ctx.setLineDash([]);
            // Dimension
            ctx.strokeStyle = 'rgba(140,200,140,0.08)';
            ctx.lineWidth = 0.3;
            ctx.beginPath();
            ctx.moveTo(cx - 80, cy + 50); ctx.lineTo(cx - 80, cy + 65);
            ctx.moveTo(cx + 80, cy + 50); ctx.lineTo(cx + 80, cy + 65);
            ctx.moveTo(cx - 80, cy + 65); ctx.lineTo(cx + 80, cy + 65);
            ctx.stroke();
            ctx.fillStyle = 'rgba(140,200,140,0.08)';
            ctx.font = '7px JetBrains Mono';
            ctx.fillText('16m', cx - 8, cy + 63);
        }

        function drawCircuitSchematic(ctx, w, h, cx, cy) {
            ctx.strokeStyle = 'rgba(140,200,140,0.2)';
            ctx.lineWidth = 0.4;
            // Nodes
            const nodes = [
                {x: cx - 60, y: cy - 30},
                {x: cx - 20, y: cy - 40},
                {x: cx + 30, y: cy - 20},
                {x: cx + 60, y: cy - 10},
                {x: cx - 40, y: cy + 30},
                {x: cx + 10, y: cy + 25},
                {x: cx + 50, y: cy + 35},
            ];
            // Edges
            const edges = [[0,1],[1,2],[2,3],[1,4],[4,5],[2,5],[5,6]];
            for (const [a,b] of edges) {
                ctx.beginPath();
                ctx.moveTo(nodes[a].x, nodes[a].y);
                ctx.lineTo(nodes[b].x, nodes[b].y);
                ctx.stroke();
            }
            // Nodes
            ctx.fillStyle = 'rgba(140,200,140,0.2)';
            for (const n of nodes) {
                ctx.beginPath();
                ctx.arc(n.x, n.y, 2.5, 0, Math.PI * 2);
                ctx.fill();
            }
            // Chip outline
            ctx.strokeStyle = 'rgba(140,200,140,0.12)';
            ctx.lineWidth = 0.4;
            ctx.strokeRect(cx - 60, cy - 10, 120, 20);
            ctx.fillStyle = 'rgba(140,200,140,0.04)';
            ctx.fillRect(cx - 60, cy - 10, 120, 20);
            // Pin markers
            ctx.strokeStyle = 'rgba(140,200,140,0.08)';
            ctx.lineWidth = 0.3;
            for (let i = 0; i < 6; i++) {
                ctx.beginPath();
                ctx.moveTo(cx - 50 + i * 20, cy - 10);
                ctx.lineTo(cx - 50 + i * 20, cy - 4);
                ctx.stroke();
            }
        }

        function drawMachineSchematic(ctx, w, h, cx, cy) {
            // 3D-ish machine frame
            ctx.strokeStyle = 'rgba(140,200,140,0.2)';
            ctx.lineWidth = 0.5;
            // Front face
            ctx.strokeRect(cx - 70, cy - 40, 140, 80);
            // Depth lines
            ctx.beginPath();
            ctx.moveTo(cx + 70, cy - 40); ctx.lineTo(cx + 85, cy - 50);
            ctx.moveTo(cx + 70, cy + 40); ctx.lineTo(cx + 85, cy + 30);
            ctx.moveTo(cx - 70, cy + 40); ctx.lineTo(cx - 55, cy + 50);
            ctx.stroke();
            // Rear face
            ctx.strokeRect(cx - 55, cy - 50, 140, 80);
            // Cross bracing
            ctx.strokeStyle = 'rgba(140,200,140,0.06)';
            ctx.lineWidth = 0.3;
            ctx.beginPath();
            ctx.moveTo(cx - 70, cy - 40); ctx.lineTo(cx - 55, cy - 50);
            ctx.moveTo(cx - 70, cy + 40); ctx.lineTo(cx - 55, cy + 50);
            ctx.moveTo(cx + 70, cy - 40); ctx.lineTo(cx + 85, cy - 50);
            ctx.moveTo(cx + 70, cy + 40); ctx.lineTo(cx + 85, cy + 30);
            ctx.stroke();
            // Labels
            ctx.fillStyle = 'rgba(140,200,140,0.06)';
            ctx.font = '6px JetBrains Mono';
            ctx.fillText('ISOMETRIC VIEW', cx - 28, cy - 55);
        }

        function drawBioSchematic(ctx, w, h, cx, cy) {
            // Waveform
            ctx.strokeStyle = 'rgba(140,200,140,0.2)';
            ctx.lineWidth = 0.6;
            ctx.beginPath();
            ctx.moveTo(cx - 100, cy + 20);
            for (let x = -100; x <= 100; x += 2) {
                const y = Math.sin(x * 0.06) * 40 + Math.sin(x * 0.015) * 20;
                ctx.lineTo(cx + x, cy - y);
            }
            ctx.stroke();
            // Second wave (fainter)
            ctx.strokeStyle = 'rgba(140,200,140,0.08)';
            ctx.lineWidth = 0.3;
            ctx.beginPath();
            ctx.moveTo(cx - 100, cy + 20);
            for (let x = -100; x <= 100; x += 2) {
                const y = Math.sin(x * 0.03 + 1) * 25 + Math.cos(x * 0.04) * 15;
                ctx.lineTo(cx + x, cy - y - 30);
            }
            ctx.stroke();
            // Spec markers
            ctx.strokeStyle = 'rgba(212,167,106,0.1)';
            ctx.lineWidth = 0.3;
            for (let x = -80; x <= 80; x += 20) {
                ctx.beginPath();
                ctx.moveTo(cx + x, cy + 25);
                ctx.lineTo(cx + x, cy + 30);
                ctx.stroke();
            }
            ctx.fillStyle = 'rgba(140,200,140,0.06)';
            ctx.font = '6px JetBrains Mono';
            ctx.fillText('SPECTROGRAM', cx - 28, cy + 40);
        }

        function drawGenericSchematic(ctx, w, h, cx, cy) {
            // Abstract technical
            ctx.strokeStyle = 'rgba(140,200,140,0.15)';
            ctx.lineWidth = 0.4;
            ctx.beginPath();
            ctx.arc(cx, cy - 10, 50, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(cx, cy - 10, 30, 0, Math.PI * 1.5);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(cx - 70, cy + 30);
            ctx.lineTo(cx, cy - 60);
            ctx.lineTo(cx + 70, cy + 30);
            ctx.closePath();
            ctx.stroke();
            ctx.fillStyle = 'rgba(140,200,140,0.03)';
            ctx.fill();
        }

        let idx = 0;
        const bp = document.getElementById('bp');
        const idEl = document.getElementById('bp-id');
        const statusEl = document.getElementById('bp-status');
        const descEl = document.getElementById('bp-desc');
        const specsEl = document.getElementById('bp-specs');
        const actionsEl = document.getElementById('bp-actions');
        const counterEl = document.getElementById('counter');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        function showBlueprint(i) {
            idx = i;
            const bpData = blueprints[idx];

            bp.classList.remove('visible');
            setTimeout(() => {
                idEl.textContent = `${bpData.id} · ${bpData.name}`;
                statusEl.textContent = bpData.type;
                descEl.textContent = bpData.desc;

                // Specs
                specsEl.innerHTML = '';
                bpData.specs.forEach(s => {
                    const div = document.createElement('div');
                    div.className = 'bp-spec';
                    div.innerHTML = `<div class="label">${s.label}</div><div class="value">${s.value}</div>`;
                    specsEl.appendChild(div);
                });

                // Actions
                actionsEl.innerHTML = '';
                bpData.actions.forEach(a => {
                    const el = document.createElement('a');
                    el.href = a.url;
                    el.textContent = a.label;
                    el.target = '_blank';
                    if (a.primary) el.className = 'primary';
                    actionsEl.appendChild(el);
                });

                counterEl.textContent = `${idx + 1} / ${blueprints.length}`;
                prevBtn.disabled = idx === 0;
                nextBtn.disabled = idx === blueprints.length - 1;

                // Draw schematic
                resizeSchematic();
                drawSchematic(bpData.style);

                bp.classList.add('visible');
            }, 150);
        }

        prevBtn.addEventListener('click', () => { if (idx > 0) showBlueprint(idx - 1); });
        nextBtn.addEventListener('click', () => { if (idx < blueprints.length - 1) showBlueprint(idx + 1); });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && idx > 0) showBlueprint(idx - 1);
            if (e.key === 'ArrowRight' && idx < blueprints.length - 1) showBlueprint(idx + 1);
        });

        // ─── INIT ───
        window.addEventListener('resize', () => {
            resizeSchematic();
            if (blueprints[idx]) drawSchematic(blueprints[idx].style);
        });

        showBlueprint(0);
