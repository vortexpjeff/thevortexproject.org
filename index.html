<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vortex Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #080a08;
            overflow: hidden;
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            width: 100vw;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
        }

        #overlay {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(163, 201, 163, 0.15);
            pointer-events: none;
            font-weight: 300;
            text-align: center;
            line-height: 1.8;
        }

        #overlay span {
            display: block;
        }

        #coords {
            position: fixed;
            bottom: 40px;
            right: 40px;
            font-size: 0.55rem;
            letter-spacing: 0.15em;
            color: rgba(163, 201, 163, 0.1);
            pointer-events: none;
            font-weight: 300;
            text-align: right;
            line-height: 1.6;
        }

        @media (max-width: 600px) {
            #coords { display: none; }
            #overlay { bottom: 24px; font-size: 0.5rem; }
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="overlay"><span>the vortex project</span><span>pine hollow · sevierville tn</span></div>
    <div id="coords">35.856548<br>−83.374437</div>
    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');

        let w, h;
        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // --- field of particles ---
        const COUNT = 180;
        const particles = [];
        const MAX_DIST = 180;

        for (let i = 0; i < COUNT; i++) {
            particles.push({
                x: Math.random() * w,
                y: Math.random() * h,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3,
                r: Math.random() * 1.5 + 0.3,
                phase: Math.random() * Math.PI * 2
            });
        }

        // --- pulse points (birds) ---
        const pulses = [];
        function addPulse(x, y) {
            pulses.push({ x, y, life: 1.0, max: 1.0 });
        }

        // simulate a bird detection every few seconds
        function randomPulse() {
            const x = Math.random() * w;
            const y = Math.random() * h;
            addPulse(x, y);
        }

        // initial burst
        for (let i = 0; i < 5; i++) setTimeout(randomPulse, i * 600);
        setInterval(randomPulse, 4000 + Math.random() * 6000);

        // --- colors ---
        const colors = [
            [163, 201, 163],  // pale green
            [122, 184, 184],  // teal
            [212, 167, 106],  // warm amber
            [90, 138, 90],    // deep green
            [180, 160, 140],  // mushroom
        ];

        function lerpColor(c1, c2, t) {
            return [
                c1[0] + (c2[0] - c1[0]) * t,
                c1[1] + (c2[1] - c1[1]) * t,
                c1[2] + (c2[2] - c1[2]) * t,
            ];
        }

        // fetch real bird data from GitHub
        let birdData = { recent: [], stats: null };
        let dataLoaded = false;
        fetch('https://raw.githubusercontent.com/vortexpjeff/pine-hollow-dashboard/main/data/latest.json', { signal: AbortSignal.timeout(5000) })
            .then(r => r.json())
            .then(d => { birdData = d; dataLoaded = true; })
            .catch(() => {});

        let frame = 0;
        function draw() {
            frame++;
            ctx.fillStyle = 'rgba(8, 10, 8, 0.12)';
            ctx.fillRect(0, 0, w, h);

            // update particles
            for (let p of particles) {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0) p.x = w;
                if (p.x > w) p.x = 0;
                if (p.y < 0) p.y = h;
                if (p.y > h) p.y = 0;

                // slight wandering
                p.vx += (Math.random() - 0.5) * 0.02;
                p.vy += (Math.random() - 0.5) * 0.02;
                p.vx *= 0.99;
                p.vy *= 0.99;
            }

            // draw edges between nearby particles
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < MAX_DIST) {
                        const alpha = (1 - dist / MAX_DIST) * 0.12;
                        // pick color based on distance rhythm
                        const ci = Math.floor((i + j + frame * 0.002) % colors.length);
                        const c = colors[ci];
                        ctx.strokeStyle = `rgba(${c[0]},${c[1]},${c[2]},${alpha})`;
                        ctx.lineWidth = 0.4;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            // draw particles
            for (let p of particles) {
                const flicker = 0.5 + 0.5 * Math.sin(frame * 0.02 + p.phase);
                const c = colors[Math.floor((p.phase + frame * 0.001) % colors.length)];
                ctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},${0.3 + 0.5 * flicker})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r * (0.5 + flicker), 0, Math.PI * 2);
                ctx.fill();
            }

            // draw pulses
            for (let i = pulses.length - 1; i >= 0; i--) {
                const p = pulses[i];
                p.life -= 0.008;
                if (p.life <= 0) { pulses.splice(i, 1); continue; }

                const r = (1 - p.life) * 120;
                const alpha = p.life * 0.4;
                const c = lerpColor([163, 201, 163], [122, 184, 184], 1 - p.life);
                ctx.strokeStyle = `rgba(${c[0]},${c[1]},${c[2]},${alpha})`;
                ctx.lineWidth = 0.8;
                ctx.beginPath();
                ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
                ctx.stroke();
            }

            // if we have bird data, spawn pulses from real detections
            if (dataLoaded && frame % 120 === 0 && birdData.recent && birdData.recent.length > 0) {
                const d = birdData.recent[Math.floor(Math.random() * birdData.recent.length)];
                if (d && d.confidence) {
                    const x = w * (0.1 + Math.random() * 0.8);
                    const y = h * (0.1 + Math.random() * 0.8);
                    addPulse(x, y);
                }
            }

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
