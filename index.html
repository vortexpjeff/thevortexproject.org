<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vortex Project — Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@250;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #070907;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            font-family: 'Inter', sans-serif;
            color: #d4d4d4;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        #label {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.5rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: rgba(140, 180, 140, 0.1);
            pointer-events: none;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 250;
            z-index: 1;
        }

        /* ─── PROJECT CARD ─── */
        #card-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 2;
        }

        .card {
            pointer-events: auto;
            background: rgba(15, 20, 15, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(163, 201, 163, 0.15);
            border-radius: 16px;
            max-width: 520px;
            width: 90%;
            padding: 32px;
            transition: opacity 0.6s ease, transform 0.6s ease;
            opacity: 0;
            transform: translateY(20px);
            box-shadow: 0 0 60px rgba(0,0,0,0.5);
        }

        .card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .card .image-area {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 8px;
            margin-bottom: 20px;
            background: rgba(163, 201, 163, 0.05);
            border: 1px solid rgba(163, 201, 163, 0.08);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .card .image-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .card .image-area .placeholder-icon {
            font-size: 2rem;
            color: rgba(163, 201, 163, 0.2);
        }

        .card .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 14px;
        }

        .card .tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            padding: 3px 10px;
            border-radius: 100px;
            background: rgba(163, 201, 163, 0.08);
            border: 1px solid rgba(163, 201, 163, 0.12);
            color: rgba(163, 201, 163, 0.6);
            letter-spacing: 0.05em;
        }

        .card h2 {
            font-size: 1.15rem;
            font-weight: 400;
            color: #e8e8e8;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .card .desc {
            font-size: 0.82rem;
            line-height: 1.6;
            color: rgba(212, 212, 212, 0.7);
            margin-bottom: 18px;
        }

        .card .links {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .card .links a {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            padding: 6px 14px;
            border-radius: 6px;
            text-decoration: none;
            background: rgba(163, 201, 163, 0.08);
            border: 1px solid rgba(163, 201, 163, 0.15);
            color: rgba(163, 201, 163, 0.8);
            transition: all 0.2s;
        }

        .card .links a:hover {
            background: rgba(163, 201, 163, 0.15);
            border-color: rgba(163, 201, 163, 0.3);
            color: #d4e8d4;
        }

        .card .links a.zip {
            background: rgba(212, 167, 106, 0.1);
            border-color: rgba(212, 167, 106, 0.2);
            color: rgba(212, 167, 106, 0.8);
        }

        .card .links a.zip:hover {
            background: rgba(212, 167, 106, 0.18);
            color: #e8d4b8;
        }

        /* ─── NAV CONTROLS ─── */
        .nav-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(163, 201, 163, 0.06);
        }

        .nav-btn {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid rgba(163, 201, 163, 0.1);
            background: rgba(163, 201, 163, 0.04);
            color: rgba(163, 201, 163, 0.5);
            cursor: pointer;
            transition: all 0.2s;
            pointer-events: auto;
        }

        .nav-btn:hover {
            background: rgba(163, 201, 163, 0.1);
            color: rgba(163, 201, 163, 0.8);
        }

        .nav-btn:disabled {
            opacity: 0.2;
            cursor: default;
        }

        .counter {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: rgba(163, 201, 163, 0.3);
            letter-spacing: 0.1em;
        }

        @media (max-width: 600px) {
            .card { padding: 24px; }
            .card h2 { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="label">the vortex project · pine hollow</div>

    <div id="card-container">
        <div class="card" id="card">
            <div class="image-area" id="imageArea">
                <span class="placeholder-icon">◈</span>
            </div>
            <div class="tags" id="tags"></div>
            <h2 id="title"></h2>
            <div class="desc" id="desc"></div>
            <div class="links" id="links"></div>
            <div class="nav-row">
                <button class="nav-btn" id="prevBtn">← previous</button>
                <span class="counter" id="counter"></span>
                <button class="nav-btn" id="nextBtn">next →</button>
            </div>
        </div>
    </div>

    <script>
        // ─── CANVAS BACKGROUND ───
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const NODES = 40;
        const nodes = [];
        function rand(min, max) { return min + Math.random() * (max - min); }

        for (let i = 0; i < NODES; i++) {
            nodes.push({
                x: rand(0, W), y: rand(0, H),
                vx: rand(-0.06, 0.06), vy: rand(-0.06, 0.06),
                phase: rand(0, Math.PI * 2),
                size: rand(0.4, 1.5),
                anchorX: rand(0, W), anchorY: rand(0, H),
                pull: rand(0.0003, 0.0015)
            });
        }

        function drawBg() {
            ctx.fillStyle = '#070907';
            ctx.fillRect(0, 0, W, H);

            for (const n of nodes) {
                n.x += n.vx; n.y += n.vy;
                const dx = n.anchorX - n.x, dy = n.anchorY - n.y;
                n.vx += dx * n.pull; n.vy += dy * n.pull;
                n.vx += rand(-0.004, 0.004); n.vy += rand(-0.004, 0.004);
                n.vx *= 0.995; n.vy *= 0.995;
                const m = 60;
                if (n.x < -m) n.x = W + m; if (n.x > W + m) n.x = -m;
                if (n.y < -m) n.y = H + m; if (n.y > H + m) n.y = -m;
            }

            const maxDist = 130;
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const dx = nodes[i].x - nodes[j].x;
                    const dy = nodes[i].y - nodes[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < maxDist) {
                        const t = 1 - dist / maxDist;
                        ctx.strokeStyle = `rgba(140,180,140,${t * t * 0.06})`;
                        ctx.lineWidth = 0.3 + t * 0.3;
                        ctx.beginPath();
                        ctx.moveTo(nodes[i].x, nodes[i].y);
                        ctx.lineTo(nodes[j].x, nodes[j].y);
                        ctx.stroke();
                    }
                }
            }

            for (const n of nodes) {
                const pulse = 0.6 + 0.4 * Math.sin(Date.now() * 0.001 + n.phase);
                const alpha = 0.15 + 0.4 * pulse;
                ctx.fillStyle = `rgba(140,180,140,${alpha})`;
                ctx.beginPath();
                ctx.arc(n.x, n.y, n.size * pulse, 0, Math.PI * 2);
                ctx.fill();
            }

            requestAnimationFrame(drawBg);
        }
        drawBg();

        // ─── PROJECT DATA ───
        let projects = [];
        let currentIndex = 0;

        const card = document.getElementById('card');
        const imageArea = document.getElementById('imageArea');
        const tagsEl = document.getElementById('tags');
        const titleEl = document.getElementById('title');
        const descEl = document.getElementById('desc');
        const linksEl = document.getElementById('links');
        const counterEl = document.getElementById('counter');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        function loadProjects(data) {
            projects = data;
            if (projects.length === 0) {
                // fallback — embedded minimal library
                projects = getFallbackProjects();
            }
            showProject(0);
        }

        function showProject(index) {
            if (projects.length === 0) return;
            currentIndex = index;
            const p = projects[currentIndex];

            card.classList.remove('visible');
            setTimeout(() => {
                // Tags
                tagsEl.innerHTML = '';
                if (p.tags) {
                    p.tags.forEach(t => {
                        const span = document.createElement('span');
                        span.className = 'tag';
                        span.textContent = t.trim();
                        tagsEl.appendChild(span);
                    });
                }

                // Title
                titleEl.textContent = p.name || 'Untitled';

                // Description
                descEl.textContent = p.desc || p.description || '';

                // Image
                imageArea.innerHTML = '';
                if (p.image) {
                    const img = document.createElement('img');
                    img.src = p.image;
                    img.alt = p.name;
                    imageArea.appendChild(img);
                } else {
                    const span = document.createElement('span');
                    span.className = 'placeholder-icon';
                    span.textContent = '◈';
                    imageArea.appendChild(span);
                }

                // Links
                linksEl.innerHTML = '';
                if (p.url) {
                    const a = document.createElement('a');
                    a.href = p.url;
                    a.textContent = '↗ website';
                    a.target = '_blank';
                    linksEl.appendChild(a);
                }
                if (p.github) {
                    const a = document.createElement('a');
                    a.href = p.github;
                    a.textContent = '↗ github';
                    a.target = '_blank';
                    linksEl.appendChild(a);
                }
                if (p.plans) {
                    const a = document.createElement('a');
                    a.href = p.plans;
                    a.textContent = '↘ plans/zip';
                    a.target = '_blank';
                    a.className = 'zip';
                    linksEl.appendChild(a);
                }

                // Counter
                counterEl.textContent = `${currentIndex + 1} / ${projects.length}`;

                // Nav
                prevBtn.disabled = currentIndex === 0;
                nextBtn.disabled = currentIndex === projects.length - 1;

                card.classList.add('visible');
            }, 100);
        }

        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) showProject(currentIndex - 1);
        });

        nextBtn.addEventListener('click', () => {
            if (currentIndex < projects.length - 1) showProject(currentIndex + 1);
        });

        // Keyboard nav
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && currentIndex > 0) showProject(currentIndex - 1);
            if (e.key === 'ArrowRight' && currentIndex < projects.length - 1) showProject(currentIndex + 1);
        });

        // ─── LOAD LIBRARY ───
        async function init() {
            try {
                const resp = await fetch('https://raw.githubusercontent.com/vortexpjeff/thevortexproject.org/main/library/open-source-library.md', {
                    signal: AbortSignal.timeout(5000)
                });
                const md = await resp.text();
                const parsed = parseProjectsFromMD(md);
                loadProjects(parsed);
            } catch {
                loadProjects(getFallbackProjects());
            }
        }

        // ─── PARSE THE MARKDOWN LIBRARY ───
        function parseProjectsFromMD(md) {
            const projects = [];
            // Split by level-3 headings (###)
            const sections = md.split(/(?=^###\s)/m);
            for (let section of sections) {
                if (!section.trim()) continue;

                const lines = section.split('\n');
                const nameLine = lines.find(l => l.startsWith('### '));
                if (!nameLine) continue;
                const name = nameLine.replace('### ', '').trim();

                // Skip section headers that aren't projects
                if (['How to use this library', 'Watchers config', 'Skill reference', 'Tags index', 'Quick reference']
                    .some(s => name.toLowerCase().includes(s.toLowerCase()))) continue;

                const urlMatch = section.match(/URL:\s*(https?:\/\/[^\s\n]+)/i);
                const descMatch = section.match(/Description:\s*(.+)/i);
                const tagsMatch = section.match(/Tags:\s*(.+)/i);
                const typeMatch = section.match(/Type:\s*(.+)/i);
                const statusMatch = section.match(/Status:\s*(.+)/i);

                // Find GitHub link
                const githubMatch = section.match(/https?:\/\/github\.com\/[^\s\n]+/);

                projects.push({
                    name,
                    url: urlMatch ? urlMatch[1].replace(/[) ,]+$/, '') : null,
                    description: descMatch ? descMatch[1].trim() : '',
                    tags: tagsMatch ? tagsMatch[1].split(',').map(t => t.trim()) : [],
                    type: typeMatch ? typeMatch[1].trim() : null,
                    status: statusMatch ? statusMatch[1].trim() : null,
                    github: githubMatch ? githubMatch[0].replace(/[) ,]+$/, '') : null,
                    image: null,
                });
            }
            return projects;
        }

        // ─── FALLBACK ───
        function getFallbackProjects() {
            return [
                {
                    name: 'Low-Tech Magazine',
                    url: 'https://solar.lowtechmagazine.com',
                    description: 'Solar-powered website publishing build guides for solar ovens, heating elements, handcarts, and passive buildings. Every article includes materials, method, and measured results.',
                    tags: ['solar', 'building', 'energy', 'cooking'],
                    github: null,
                    image: null,
                },
                {
                    name: 'Open Source Ecology',
                    url: 'https://www.opensourceecology.org',
                    description: 'Global Village Construction Set — 50 open source industrial machines that can be built for a fraction of commercial cost. Includes tractor, brick press, wind turbine, sawmill.',
                    tags: ['industrial', 'machinery', 'fabrication', 'open-hardware'],
                    github: 'https://github.com/OpenSourceEcology',
                    image: null,
                },
                {
                    name: 'FarmBot',
                    url: 'https://farm.bot',
                    description: 'Open source CNC farming platform. Genesis v1.8 is a precision agriculture robot that seeds, waters, and weeds a garden bed autonomously. All CAD on GitHub.',
                    tags: ['agriculture', 'robotics', 'CNC', 'automation'],
                    github: 'https://github.com/FarmBot',
                    image: null,
                },
                {
                    name: 'Appropedia',
                    url: 'https://www.appropedia.org',
                    description: 'The sustainability wiki — 4,500+ documented projects covering solar cookers, rainwater harvesting, greywater systems, composting toilets, rocket stoves, pedal generators.',
                    tags: ['water', 'energy', 'building', 'DIY'],
                    github: null,
                    image: null,
                },
                {
                    name: 'llama.cpp',
                    url: 'https://github.com/ggml-org/llama.cpp',
                    description: 'The standard for running LLMs on consumer hardware. CUDA, Metal, Vulkan, CPU backends. Runs Gemma 4 26B on a 4090 at 127 tok/s. Used daily at Pine Hollow.',
                    tags: ['inference', 'LLM', 'local', 'quantization'],
                    github: 'https://github.com/ggml-org/llama.cpp',
                    image: null,
                },
                {
                    name: 'BirdNET-Pi',
                    url: 'https://github.com/mcguirepr89/BirdNET-Pi',
                    description: 'Turnkey BirdNET installation for Raspberry Pi. Installs as a systemd service, web UI, SQLite database, clip extraction. The actual stack running at Pine Hollow.',
                    tags: ['birds', 'bioacoustics', 'Pi', '24-7'],
                    github: 'https://github.com/mcguirepr89/BirdNET-Pi',
                    image: null,
                },
                {
                    name: 'MNT Reform',
                    url: 'https://mntre.com/reform2.html',
                    description: 'Open source laptop — fully repairable, modular, no soldered components. ARM or RISC-V mainboard. Designed for right to repair and longevity.',
                    tags: ['laptop', 'open-hardware', 'repairable'],
                    github: 'https://github.com/mntre',
                    image: null,
                },
                {
                    name: 'MySensors',
                    url: 'https://mysensors.org',
                    description: 'Open source framework for DIY IoT sensors. Arduino and ESP32 based. Soil moisture, temperature, humidity, light, water flow sensors. Wireless mesh network.',
                    tags: ['IoT', 'sensors', 'arduino', 'wireless'],
                    github: 'https://github.com/mysensors',
                    image: null,
                },
                {
                    name: 'OpenSprinkler',
                    url: 'https://opensprinkler.com',
                    description: 'Open source irrigation controller. WiFi-enabled, web interface, weather-based scheduling. DIY kit or pre-assembled. Full plans and firmware available.',
                    tags: ['irrigation', 'water', 'automation', 'ESP8266'],
                    github: 'https://github.com/OpenSprinkler',
                    image: null,
                },
            ];
        }

        init();
    </script>
</body>
</html>
