<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Vortex Project</title>
  <style>
    :root{--bg:#030705;--green:#79ff9e;--gold:#ffd56a;--teal:#47f5d1}
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);overflow:hidden;height:100vh;width:100vw;cursor:crosshair}
    canvas#field{display:block;position:fixed;inset:0;width:100vw;height:100vh;z-index:0}
    #aurora{position:fixed;inset:-10%;z-index:1;pointer-events:none;mix-blend-mode:screen;filter:blur(12px);opacity:.82}
    .aurora-band{position:absolute;width:72vw;height:28vh;border-radius:50%;opacity:.22;animation:swim 16s ease-in-out infinite alternate;transform-origin:center}
    .aurora-band:nth-child(1){left:-9%;top:10%;background:radial-gradient(ellipse,rgba(71,245,209,.55),transparent 65%);animation-duration:21s}
    .aurora-band:nth-child(2){right:-8%;top:30%;background:radial-gradient(ellipse,rgba(121,255,158,.44),transparent 65%);animation-duration:17s;animation-delay:-6s}
    .aurora-band:nth-child(3){left:15%;bottom:0;background:radial-gradient(ellipse,rgba(255,213,106,.32),transparent 70%);animation-duration:25s;animation-delay:-11s}
    @keyframes swim{0%{transform:translate3d(-2%,0,0) rotate(-8deg) scale(1)}100%{transform:translate3d(5%,6%,0) rotate(10deg) scale(1.16)}}
    .ripple{position:fixed;z-index:4;border-radius:50%;pointer-events:none;border:1px solid rgba(255,213,106,.48);box-shadow:0 0 28px rgba(255,213,106,.24);animation:ripple 1.3s ease-out forwards;mix-blend-mode:screen}
    .spark{position:fixed;z-index:4;width:5px;height:5px;border-radius:50%;pointer-events:none;background:var(--green);box-shadow:0 0 18px var(--green);animation:spark .9s ease-out forwards;mix-blend-mode:screen}
    @keyframes ripple{0%{width:0;height:0;opacity:1;transform:translate(-50%,-50%) scale(.2)}100%{width:360px;height:360px;opacity:0;transform:translate(-50%,-50%) scale(1)}}
    @keyframes spark{to{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.1)}}
    @media (prefers-reduced-motion:reduce){canvas#field{display:none}#aurora{display:none}}
  </style>
</head>
<body>
  <canvas id="field" aria-hidden="true"></canvas>
  <div id="aurora" aria-hidden="true"><div class="aurora-band"></div><div class="aurora-band"></div><div class="aurora-band"></div></div>
  <script>
    const root = document.documentElement;
    const canvas = document.getElementById('field');
    const ctx = canvas.getContext('2d', { alpha: true });
    let W = 0, H = 0, DPR = 1, tick = 0, last = performance.now();
    const pointer = { x: innerWidth * .5, y: innerHeight * .5, tx: innerWidth * .5, ty: innerHeight * .5, energy: .35 };
    const motes = [], threads = [], ripples = [];

    function rand(a,b){ return a + Math.random() * (b-a); }
    function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
    function resize(){
      DPR = Math.min(2, window.devicePixelRatio || 1);
      W = canvas.width = Math.floor(innerWidth * DPR);
      H = canvas.height = Math.floor(innerHeight * DPR);
      canvas.style.width = innerWidth + 'px'; canvas.style.height = innerHeight + 'px';
      ctx.setTransform(DPR,0,0,DPR,0,0);
    }
    resize(); addEventListener('resize', resize);

    function seedMotes(){
      motes.length = 0; threads.length = 0;
      const count = Math.min(240, Math.max(120, Math.floor(innerWidth * innerHeight / 7200)));
      for(let i=0;i<count;i++) motes.push({x:rand(0,innerWidth),y:rand(0,innerHeight),vx:rand(-.18,.18),vy:rand(-.12,.12),r:rand(.55,2.2),h:rand(115,170),phase:rand(0,Math.PI*2),life:rand(.2,1),pull:rand(.001,.006)});
      for(let i=0;i<36;i++) threads.push({a:Math.floor(rand(0,count)),b:Math.floor(rand(0,count)),phase:rand(0,Math.PI*2),w:rand(.3,1.1)});
    }
    seedMotes(); addEventListener('resize', seedMotes);

    function createRippleDom(x,y){ const r=document.createElement('div'); r.className='ripple'; r.style.left=x+'px'; r.style.top=y+'px'; document.body.appendChild(r); setTimeout(()=>r.remove(),1350); }
    function sparkBurst(x,y,n){ for(let i=0;i<n;i++){ const s=document.createElement('div'); s.className='spark'; s.style.left=x+'px'; s.style.top=y+'px'; const a=rand(0,Math.PI*2), d=rand(40,180); s.style.setProperty('--dx', Math.cos(a)*d+'px'); s.style.setProperty('--dy', Math.sin(a)*d+'px'); s.style.background = i%4===0 ? 'var(--gold)' : (i%3===0 ? 'var(--teal)' : 'var(--green)'); document.body.appendChild(s); setTimeout(()=>s.remove(),920); } }

    addEventListener('pointermove', e=>{ pointer.tx=e.clientX; pointer.ty=e.clientY; root.style.setProperty('--hotx', e.clientX+'px'); root.style.setProperty('--hoty', e.clientY+'px'); });
    addEventListener('pointerdown', e=>{ createRippleDom(e.clientX,e.clientY); sparkBurst(e.clientX,e.clientY,Math.floor(8+Math.random()*18)); pointer.energy=clamp(pointer.energy+.35,.15,2.4); });
    addEventListener('pointerup', ()=>{});

    function draw(now){
      const dt = Math.min(32, now-last); last = now; tick += dt * .001;
      pointer.x += (pointer.tx - pointer.x) * .08; pointer.y += (pointer.ty - pointer.y) * .08; pointer.energy *= .985; pointer.energy = Math.max(.2, pointer.energy);
      ctx.clearRect(0,0,innerWidth,innerHeight);
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = 'rgba(2,7,4,.5)'; ctx.fillRect(0,0,innerWidth,innerHeight);
      ctx.globalCompositeOperation = 'lighter';

      const grd = ctx.createRadialGradient(pointer.x,pointer.y,0,pointer.x,pointer.y,Math.max(innerWidth,innerHeight)*.42);
      grd.addColorStop(0,`rgba(121,255,158,${.06 + pointer.energy*.035})`); grd.addColorStop(.42,'rgba(71,245,209,.025)'); grd.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle = grd; ctx.fillRect(0,0,innerWidth,innerHeight);

      for(const m of motes){
        const dx = pointer.x - m.x, dy = pointer.y - m.y, dist = Math.hypot(dx,dy) || 1;
        const force = clamp((220 - dist)/220, 0, 1) * (.012 + pointer.energy*.01);
        m.vx -= dx/dist * force; m.vy -= dy/dist * force;
        m.vx += Math.sin(tick*.7 + m.phase) * .003; m.vy += Math.cos(tick*.55 + m.phase) * .002;
        m.x += m.vx * dt; m.y += m.vy * dt; m.vx *= .988; m.vy *= .988;
        if(m.x < -30) m.x = innerWidth+30; if(m.x > innerWidth+30) m.x = -30; if(m.y < -30) m.y = innerHeight+30; if(m.y > innerHeight+30) m.y = -30;
      }

      for(const t of threads){
        const a=motes[t.a], b=motes[t.b]; if(!a||!b) continue;
        const d=Math.hypot(a.x-b.x,a.y-b.y); if(d>210) continue;
        const alpha=(1-d/210)*(.08 + pointer.energy*.018)*( .55 + .45*Math.sin(tick*2+t.phase));
        ctx.strokeStyle=`hsla(${128+Math.sin(tick+t.phase)*24},100%,72%,${alpha})`; ctx.lineWidth=t.w; ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
      }

      for(const m of motes){
        const pulse=.6+.4*Math.sin(tick*2.2 + m.phase);
        const near=clamp(1 - Math.hypot(pointer.x-m.x,pointer.y-m.y)/180, 0, 1);
        const r=m.r*(1+pulse*.8+near*2.2); const alpha=.14 + pulse*.22 + near*.38;
        ctx.fillStyle=`hsla(${m.h+near*35},100%,70%,${alpha})`; ctx.beginPath(); ctx.arc(m.x,m.y,r,0,Math.PI*2); ctx.fill();
      }
      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);

    // ── Observatory data drivers ─────────────────────────────────────
    let obsData = null, obsMotes = [], flareSparks = 0, lastFlareBurst = 0;
    const motesOrig = motes.slice(); // snapshot of initial random velocities
    for (let i = 0; i < motes.length; i++) {
      obsMotes.push({baseVx: motes[i].vx, baseVy: motes[i].vy});
    }

    async function loadObsData() {
      try {
        const r = await fetch('/data/observatory.json', {cache: 'no-cache'});
        if (r.ok) obsData = await r.json();
      } catch(e) {}
    }
    loadObsData();
    setInterval(loadObsData, 5 * 60 * 1000);

    function applyObsData() {
      if (!obsData) return;
      const sw = obsData.solar_wind || {};
      const mg = obsData.magnetosphere || {};
      const sun = obsData.sun || {};

      // Kp → aurora band opacity
      const kp = mg.kp_now || mg.kp_1m || 0;
      const auroraEl = document.getElementById('aurora');
      if (auroraEl) {
        const opacity = Math.min(0.95, 0.1 + kp * 0.16);
        auroraEl.style.opacity = String(opacity);
        // Shift hue toward red when Bz southward
        const bz = sw.bz_nt || 0;
        const hueShift = bz < 0 ? Math.min(40, Math.abs(bz) * 5) : 0;
        auroraEl.style.filter = `blur(12px) hue-rotate(${hueShift}deg)`;
      }

      // Solar wind speed → mote velocity multiplier
      const speed = sw.speed_kms || 400;
      const velMult = 0.6 + (speed - 300) / 500 * 1.2; // 300→0.6, 800→1.8
      for (let i = 0; i < motes.length; i++) {
        if (i < obsMotes.length) {
          motes[i].vx = obsMotes[i].baseVx * velMult;
          motes[i].vy = obsMotes[i].baseVy * velMult;
        }
      }

      // Flare class → spark burst frequency
      const flareClass = sun.xray_class || 'A';
      const flareRates = {A:0, B:0.02, C:0.08, M:0.25, X:0.6};
      const rate = flareRates[flareClass] || 0;
      if (Math.random() < rate && performance.now() - lastFlareBurst > 3000) {
        lastFlareBurst = performance.now();
        flareSparks = Math.floor(8 + (flareClass === 'X' ? 40 : flareClass === 'M' ? 20 : 10));
      }
      if (flareSparks > 0 && tick % 3 === 0) {
        const x = Math.random() * innerWidth;
        const y = Math.random() * innerHeight * 0.3; // top third
        sparkBurst(x, y, Math.min(flareSparks, 5));
        flareSparks = Math.max(0, flareSparks - 5);
      }

      // Thread count → Kp
      const threadTarget = Math.floor(12 + kp * 8); // Kp 0→12 threads, Kp 5→52
      while (threads.length < threadTarget) {
        threads.push({a: Math.floor(Math.random() * motes.length),
                      b: Math.floor(Math.random() * motes.length),
                      phase: Math.random() * Math.PI * 2,
                      w: 0.3 + Math.random() * 0.8});
      }
      while (threads.length > Math.max(12, threadTarget)) threads.pop();
    }

    // Run data-driven updates every 2 seconds
    setInterval(applyObsData, 2000);
    applyObsData();
  </script>
  <a href="/observatory.html" id="obs-link" title="Skyspace Chart">◉</a>
  <style>
    #obs-link{position:fixed;bottom:1.2rem;right:1.2rem;z-index:10;color:rgba(121,255,158,.5);
              font-size:1.4rem;text-decoration:none;transition:.3s;text-shadow:0 0 12px rgba(121,255,158,.3)}
    #obs-link:hover{color:var(--green);text-shadow:0 0 20px rgba(121,255,158,.6);transform:scale(1.15)}
  </style>
</body>
</html>
